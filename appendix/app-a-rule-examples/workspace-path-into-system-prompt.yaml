rules:
  # PH-1: Workspace / CWD path interpolated into a system prompt
  # without stripping control/format/bidi characters.
  # Catches: GHSA-2qj5-gwg2-xwc4 (OC-19, "Unsanitized CWD path injection
  # into LLM prompts" — workspaceDir was inlined into systemPrompt).
  - id: workspace-path-into-system-prompt
    languages: [typescript, javascript]
    severity: WARNING
    message: >
      A workspace / cwd / directory path is interpolated into a system
      prompt or prompt template without sanitization. A directory name
      can contain newlines, Unicode bidi marks, or zero-width characters
      that break prompt structure and inject attacker-controlled
      instructions. Wrap with sanitizePromptText() / strip control chars
      before interpolating.
    metadata:
      cwe:
        - "CWE-20: Improper Input Validation"
        - "CWE-77: Improper Neutralization of Special Elements used in a Command"
      category: security
      confidence: MEDIUM
      impact: HIGH
      cat: "Cat-1: Prompt Handling"
      example_advisory: "GHSA-2qj5-gwg2-xwc4"
    pattern-either:
      - patterns:
          - pattern: |
              `...${$VAR}...`
          - metavariable-regex:
              metavariable: $VAR
              regex: '.*(workspaceDir|workspacePath|cwd|currentDir|workingDir|projectDir|projectRoot)$'
          - pattern-inside: |
              function $F(...) { ... }
          - pattern-not-inside: |
              sanitizePromptText(...)
          - pattern-not-inside: |
              stripControlChars(...)
      - patterns:
          - pattern: |
              systemPrompt = `...${$VAR}...`
          - metavariable-regex:
              metavariable: $VAR
              regex: '.*(workspace|cwd|dir|path|root).*'
